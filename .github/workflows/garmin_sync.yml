name: Garmin Sync

on:
  workflow_dispatch:   # käsitsi käivitus (Sync nupp rakenduses)
  schedule:
    - cron: '0 5 * * *'   # iga päev kell 08:00 EET (05:00 UTC)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Taasta Garmin tokenid (väldib igapäevast uut loginit)
        run: |
          mkdir -p .garmin_tokens
          if [ -n "$GARMIN_TOKENS" ]; then
            echo "$GARMIN_TOKENS" | base64 -d > /tmp/tokens.zip
            unzip -o /tmp/tokens.zip -d .garmin_tokens/ && echo "✅ Tokenid taastatud"
          else
            echo "ℹ️  GARMIN_TOKENS puudub — teen värske logini"
          fi
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}

      - name: Installi sõltuvused
        run: pip install garminconnect requests

      - name: Sünkroniseeri Garmin andmed
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: python garmin_sync_ci.py

      - name: Salvesta Garmin tokenid (järgmine kord ei logi uuesti sisse)
        if: success()
        run: |
          if [ -d ".garmin_tokens" ] && [ "$(ls -A .garmin_tokens)" ]; then
            cd .garmin_tokens
            zip -r /tmp/tokens_new.zip .
            echo "TOKENS_B64=$(base64 -w 0 /tmp/tokens_new.zip)" >> $GITHUB_OUTPUT
            echo "✅ Tokenid salvestatud — uuenda GARMIN_TOKENS secret käsitsi kui vaja"
          fi
        id: save_tokens
